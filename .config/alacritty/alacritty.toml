# Shared alacritty config — machine-specific overrides in local.toml
general.import = ["~/.config/alacritty/local.toml"]

[env]
TERM = "xterm-256color"

[mouse]
hide_when_typing = true

[terminal]
osc52 = "CopyPaste"

[font]
size = 12

[font.normal]
family = "Hack Nerd Font"

[window.padding]
x = 7
y = 0
