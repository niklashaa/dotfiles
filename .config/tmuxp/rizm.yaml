session_name: rizm
start_directory: ~/code/rizm

windows:
  - window_name: dev
    start_directory: ~/code/rizm/dev
    layout: main-vertical
    options:
      main-pane-width: 65%
    panes:
      - vim
      - shell_command:
          - claude --continue
      - shell_command:
          - cd app && FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099 SERVICE_URL=http://localhost:8080 DOTENV=~/code/rizm/.env yarn dev:local
      - shell_command:
          - cd app && yarn dev:services

  - window_name: niklas
    start_directory: ~/code/rizm/niklas
    layout: main-vertical
    options:
      main-pane-width: 65%
    panes:
      - vim
      - shell_command:
          - claude --continue
      - shell_command:
          - cd app && PORT=30001 FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099 SERVICE_URL=http://localhost:8080 yarn dev --dotenv ~/code/rizm/.env

  - window_name: mrs
    start_directory: ~/code/rizm/mrs
    layout: main-vertical
    options:
      main-pane-width: 65%
    panes:
      - vim
      - shell_command:
          - claude --continue
      - shell_command:
          - cd app

  - window_name: projects
    start_directory: ~/code/rizm/projects
    layout: main-vertical
    options:
      main-pane-width: 65%
    panes:
      - vim
      - shell_command:
          - claude --continue
      - shell_command:
          - cd app && PORT=30003 FIREBASE_AUTH_EMULATOR_HOST=127.0.0.1:9099 SERVICE_URL=http://localhost:8080 yarn dev --dotenv ~/code/rizm/.env

